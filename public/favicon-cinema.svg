<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="filmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Film strip background -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Film holes -->
  <circle cx="6" cy="6" r="1.5" fill="#666"/>
  <circle cx="26" cy="6" r="1.5" fill="#666"/>
  <circle cx="6" cy="26" r="1.5" fill="#666"/>
  <circle cx="26" cy="26" r="1.5" fill="#666"/>

  <!-- Film frames -->
  <rect x="4" y="10" width="24" height="3" fill="#333"/>
  <rect x="4" y="15" width="24" height="3" fill="#333"/>
  <rect x="4" y="20" width="24" height="3" fill="#333"/>

  <!-- Play button -->
  <polygon points="16,12 22,16 16,20" fill="url(#filmGradient)"/>
</svg>